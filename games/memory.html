<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MEMORY - NEON ARCADE</title>
<link rel="stylesheet" href="../styles.css">
<style>
  .mem-board { --cell: min(100px, 19vmin); display:grid; grid-template-columns:repeat(4,var(--cell)); gap:8px; padding:12px; }
  .card { width:var(--cell); height:var(--cell); perspective:600px; cursor:pointer; }
  .card-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s; }
  .card.flipped .card-inner, .card.matched .card-inner { transform:rotateY(180deg); }
  .face { position:absolute; inset:0; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-sm); }
  .front { background:rgba(0,0,30,0.9); border:2px solid var(--neon-pink); box-shadow:0 0 12px var(--neon-pink); color:var(--neon-pink); font-family:'Press Start 2P',monospace; font-size:calc(var(--cell)*0.28); }
  .back { background:rgba(0,0,30,0.9); border:2px solid var(--neon-yellow); box-shadow:0 0 12px var(--neon-yellow); transform:rotateY(180deg); font-size:calc(var(--cell)*0.5); }
  .card.matched .back { border-color:var(--neon-green); box-shadow:0 0 18px var(--neon-green); animation: matchPulse .6s ease-out; }
  @keyframes matchPulse { 0% { transform: rotateY(180deg) scale(1.2); } 100% { transform: rotateY(180deg) scale(1); } }
</style>
</head>
<body class="crt game-shell-host">
  <div class="scanlines"></div>
  <div class="game-shell">
    <header class="top-bar">
      <a class="back-btn" href="../hub.html">◄ EXIT</a>
      <div class="game-title">🧠 MEMORY</div>
      <div id="hdrRight"></div>
    </header>
    <div class="hud">
      <div class="score-chip">MOVES: <b id="moves">0</b></div>
      <div class="score-chip">MATCHES: <b id="matches">0</b>/8</div>
      <div class="score-chip">BEST: <b id="best">--</b></div>
    </div>
    <div class="play-area" id="playArea">
      <div class="mem-board game-board" id="board"></div>
    </div>
    <footer class="bottom-bar">
      <div class="message" id="msg">FIND ALL PAIRS</div>
      <button class="btn" id="reset">NEW GAME</button>
    </footer>
  </div>

<script src="../audio.js"></script>
<script src="../themes.js"></script>
<script src="../avatars.js"></script>
<script src="../gamelib.js"></script>
<script>
const symbols = ['🎮','👾','🚀','⭐','💎','🎯','🌙','⚡'];
const boardEl = document.getElementById('board');
let cards, flipped, matches, moves, lock=false;
// Memory uses lower-is-better: store score = 100 - moves so leaderboard sorts properly
let bestMoves = parseInt(localStorage.getItem('memBest') || '0') || null;
document.getElementById('best').textContent = bestMoves ?? '--';

gamelib.mountPauseButton(document.getElementById('hdrRight'), { onResume:()=>{}, onRestart:()=>init() });

function init(){
  cards = [...symbols, ...symbols].sort(()=>Math.random()-0.5);
  flipped=[]; matches=0; moves=0; lock=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('matches').textContent=0;
  document.getElementById('msg').textContent='FIND ALL PAIRS';
  boardEl.innerHTML='';
  cards.forEach((sym,i)=>{
    const c = document.createElement('div'); c.className='card'; c.dataset.i=i;
    c.innerHTML = `<div class="card-inner"><div class="face front">?</div><div class="face back">${sym}</div></div>`;
    c.onclick = ()=>flip(c,i);
    boardEl.appendChild(c);
  });
}
function flip(el,i){
  if(lock || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  el.classList.add('flipped');
  sfx.flip();
  flipped.push({el,i,sym:cards[i]});
  if(flipped.length===2){
    moves++; document.getElementById('moves').textContent=moves;
    lock=true;
    const [a,b]=flipped;
    if(a.sym===b.sym){
      setTimeout(()=>{
        a.el.classList.add('matched'); b.el.classList.add('matched');
        matches++; document.getElementById('matches').textContent=matches;
        gamelib.popup(a.el, '✓', { color:'#5dff8a' });
        gamelib.popup(b.el, '✓', { color:'#5dff8a' });
        flipped=[]; lock=false;
        if(matches===8){
          const isBest = !bestMoves || moves<bestMoves;
          if(isBest){ bestMoves=moves; localStorage.setItem('memBest',bestMoves); document.getElementById('best').textContent=bestMoves; }
          // Score for leaderboard: higher is better, so use 100 - moves capped
          const lbScore = Math.max(1, 100 - moves);
          gamelib.setBestIfHigher('memory', lbScore);
          gamelib.unlock('first_win');
          gamelib.unlock('memory_full');
          gamelib.addCoins(Math.max(3, 30 - moves), 'memory');
          gamelib.trackPlayed('memory');
          sfx.win();
          setTimeout(() => {
            gamelib.gameOver({
              title: 'COMPLETE!',
              subtitle: isBest ? '🏆 NEW BEST' : '',
              stats: [
                { label:'MOVES', value: moves },
                { label:'BEST', value: bestMoves },
              ],
              onRestart: ()=>init()
            });
          }, 600);
        } else sfx.coin();
      },300);
    } else {
      setTimeout(()=>{
        a.el.classList.remove('flipped'); b.el.classList.remove('flipped');
        flipped=[]; lock=false;
      },800);
    }
  }
}
document.getElementById('reset').onclick = ()=>{ sfx.click(); init(); };
init();
</script>
</body>
</html>
